display_name: AI Preflight Skill v3.1
short_description: Runtime execution engine v3.1 - 11-phase planning with mandatory coverage checklists, pros/cons for every option, completeness gate, anti-drift rollback. FULL MODE for new projects, LIGHT MODE for small changes.
default_prompt: 我想做一个项目，帮我先梳理需求、分阶段反问关键问题（每个问题列出选项优劣、解释专业术语、提示我也可以提出新方案）、锁定决策、检查完整性、分析风险、设计架构、审查安全、制定测试验收计划，然后再输出开发规格。